services:
  db:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
      POSTGRES_DB: test
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - base
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 5s
      timeout: 10s
      retries: 5

  web:
    build: .
    ports:
      - "${APP_PORT}:5000"
    environment:
      - PG_HOST=db
      - PG_PORT=${PG_PORT}
    networks:
      - base
    depends_on:
      db:
        condition: service_healthy

networks:
  base:
    driver: bridge

volumes:
  db:
